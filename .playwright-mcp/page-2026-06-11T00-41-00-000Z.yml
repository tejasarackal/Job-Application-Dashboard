              - text: "Applicants in San Francisco: Qualified applications with arrest or conviction records will be considered for employment in accordance with the San Francisco Fair Chance Ordinance for Employers and the California Fair Chance Act. The application window will be open until at least June 19, 2026. This opportunity will remain online based on business needs which may be before or after the specified date. In accordance with Washington state law, we are highlighting our comprehensive benefits package, which is available to all eligible US based employees. Benefits for this role include:"
              - list [ref=e91]:
                - listitem [ref=e92]: Health, dental, vision, life, disability insurance
                - listitem [ref=e93]: "Retirement Benefits: 401(k) with company match"
                - listitem [ref=e94]: "Paid Time Off: 20 days of vacation per year, accruing at a rate of 6.15 hours per pay period for the first five years of employment"
                - listitem [ref=e95]: "Sick Time: 40 hours/year (increased to 69 hours/year for Seattle) including 5 discretionary sick days per instance"
                - listitem [ref=e96]: "Maternity Leave (Short-Term Disability + Baby Bonding): 28-30 weeks"
                - listitem [ref=e97]: "Baby Bonding Leave: 18 weeks"
                - listitem [ref=e98]: "Holidays: 13 paid days per year"
              - text: "Note: By applying to this position you will have an opportunity to share your preferred working location from the following:"
              - strong [ref=e99]: San Francisco, CA, USA; Boulder, CO, USA; Mountain View, CA, USA; New York, NY, USA; Seattle, WA, USA; Portland, OR, USA
              - text: .
              - strong [ref=e100]: "Minimum qualifications:"
              - list [ref=e101]:
                - listitem [ref=e102]: Bachelor’s degree in Computer Science, Mathematics, a quantitative discipline, or equivalent practical experience.
                - listitem [ref=e103]: 2 years of experience with software development in one or more programming languages, or 1 year of experience with an advanced degree, with experience in coding (e.g., Python, R, SQL) and querying databases.
                - listitem [ref=e104]: 2 years of experience using analytics to solve product or business problems, including managing ETL/ELT processes and statistical analysis.
                - listitem [ref=e105]: Experience in designing data pipelines and executing conceptual and physical data modeling.
                - listitem [ref=e106]: Experience in data warehouse design, data integration, data marts, and managing cross-functional stakeholder collaboration.
              - strong [ref=e107]: "Preferred qualifications:"
              - list [ref=e108]:
                - listitem [ref=e109]: Master's degree or PhD in Computer Science, Statistics, Engineering, Mathematics, Sciences, or related technical fields.
                - listitem [ref=e110]: 2 years of experience with data structures and algorithms, specifically applied to scalable data architecture and analytics.
                - listitem [ref=e111]: Experience developing accessible technologies and solutions that balance rapid experimentation with robust, long-term engineering design.
                - listitem [ref=e112]: Proven understanding of environmental data structures, carbon accounting methodologies, or data center energy and efficiency.
                - listitem [ref=e113]: Strong domain knowledge and familiarity with broader sustainability and renewable energy concepts.
              - strong [ref=e114]: About The Job
              - text: "Google's software engineers develop the next-generation technologies that change how billions of users connect, explore, and interact with information and one another. Our products need to handle information at massive scale, and extend well beyond web search. We're looking for engineers who bring fresh ideas from all areas, including information retrieval, distributed computing, large-scale system design, networking and data storage, security, artificial intelligence, natural language processing, UI design and mobile; the list goes on and is growing every day. As a software engineer, you will work on a specific project critical to Google’s needs with opportunities to switch teams and projects as you and our fast-paced business grow and evolve. We need our engineers to be versatile, display leadership qualities and be enthusiastic to take on new problems across the full-stack as we continue to push technology forward. The Sustainability Data and Tech team sits within Google's Global Sustainability Team, the central organization driving our company’s ambitious climate action, clean energy, and decarbonization goals. We focus on building a more sustainable future for everyone by driving strategy and catalyzing solutions at scale. Our team leads the engineering and development of solutions that enable smarter sustainability insights and decision-making across Alphabet. We collect, organize, and share critical sustainability data to empower Google’s operations and global climate impact strategies. As a Software Engineer blending data engineering and software development expertise, you will build critical data solutions driving Google's climate action goals. The Global Sustainability team enables Google to build a more sustainable future for everyone by driving strategy and solutions. We drive the development and implementation of Google’s global sustainability strategy to further empower action, ensure alignment and prioritization, identify leadership opportunities, and mitigate risks. We drive sustainability strategy and programs on carbon, circular economy, water, product integration, reporting, and employee engagement, while serving as a sustainability leadership advocate internally and externally. Individual pay is determined by factors including job-related skills, experience, and relevant education or training. US: $147000 - $211000 (USD) + 15% bonus target + bonus + equity + benefits"
              - strong [ref=e115]: Responsibilities
              - text: Learn more about benefits at Google .
              - list [ref=e116]:
                - listitem [ref=e117]: Write product or system development code to build and optimize scalable and efficient data pipelines, data integrations, and data mart solutions managing sustainability datasets.
                - listitem [ref=e118]: Participate in, or lead design reviews with peers and stakeholders to decide amongst available technologies, balancing long-term, scalable architecture design with the need for rapid iteration in a dynamic field.
                - listitem [ref=e119]: Review code developed by other developers and provide feedback to ensure best practices across both software and data domains.
                - listitem [ref=e120]: Contribute to existing documentation or educational content and adapt content based on product/program updates, helping to drive broader cross-Google sustainability engineering strategy and scaling impact.
                - listitem [ref=e121]: Triage product or system issues and debug/track/resolve by analyzing the sources of issues and the impact on hardware, network, or service operations and quality across our critical climate data applications.
              - text: Google is proud to be an equal opportunity workplace and is an affirmative action employer. We are committed to equal employment opportunity regardless of race, color, ancestry, religion, sex, national origin, sexual orientation, age, citizenship, marital status, disability, gender identity or Veteran status. We also consider qualified applicants regardless of criminal histories, consistent with legal requirements. See also Google's EEO Policy and EEO is the Law. If you have a disability or special need that requires accommodation, please let us know by completing our Accommodations for Applicants form .
