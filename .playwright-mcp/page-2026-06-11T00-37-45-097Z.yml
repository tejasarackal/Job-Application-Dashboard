          - generic [ref=e150]:
            - paragraph [ref=e151]: Within NVIDIA, our Financial Services Engineering (FSE) group’s mission is to architect the financial infrastructure powering NVIDIA Cloud Services, including GeForce Now, by owning the end-to-end monetization pipeline. We orchestrate seamless global payment capture and transform complex service usage into precise financial obligations, leveraging tax engines, financial ledgers, and compliant invoicing to ensure every customer transaction is accurate and frictionless across the globe.
            - paragraph [ref=e152]
            - paragraph [ref=e153]: We are looking for a Senior Data Engineer to join our Financial Systems Engineering team. This role involves building the foundational systems that support NVIDIA's high-performance financial infrastructure. This individual will play an important role in building scalable cloud services that integrate with diverse financial systems, enabling operational automation across global financial operations.
            - paragraph [ref=e154]
            - paragraph [ref=e155]: "What You'll Be Doing:"
            - list [ref=e156]:
              - listitem [ref=e157]:
                - paragraph [ref=e158]: "Pipeline Architecture & Integrity: Architect event-driven pipelines (Kafka) and develop new data models that ensure transactional integrity (ACID) for commercial events like invoices, payments, and adjustments."
              - listitem [ref=e159]:
                - paragraph [ref=e160]: "Scalable Data Solutions: Automate scalable ETL processes and refactor next-generation data architectures to improve quality, security, and coverage for rapidly growing business demands."
              - listitem [ref=e161]:
                - paragraph [ref=e162]: "Operational Excellence: Collaborate across teams to codify business processes into self-measuring systems, debugging complex challenges to ensure the reliability of financial operations."
            - paragraph [ref=e163]
            - paragraph [ref=e164]: "What We Need To See:"
            - list [ref=e165]:
              - listitem [ref=e166]:
                - paragraph [ref=e167]: Bachelor’s degree (or equivalent experience); Master’s preferred.
              - listitem [ref=e168]:
                - paragraph [ref=e169]: 10+ years of industry experience delivering scalable financial services.
              - listitem [ref=e170]:
                - paragraph [ref=e171]: "Core Technical Skills: Expertise in building scalable REST APIs backed by PostgreSQL and proficiency in Python, Golang, Scala, or NodeJS. Hands-on experience architecting robust ETL/ELT pipelines using Databricks and dbt to manage large-scale Delta Lake or Apache Iceberg tables."
              - listitem [ref=e172]:
                - paragraph [ref=e173]: "Infrastructure & Systems: Deep understanding of high-scale distributed systems, Linux, and cloud infrastructure (AWS/GCP/Azure) using container technologies like Docker and Kubernetes."
            - paragraph [ref=e174]
            - paragraph [ref=e175]: "Ways to Stand Out from the Crowd:"
            - list [ref=e176]:
              - listitem [ref=e177]:
                - paragraph [ref=e178]: "Advanced Data Modeling: Experience developing data ontology or semantic data layers that map disparate raw data into interconnected objects with defined properties and functions."
              - listitem [ref=e179]:
                - paragraph [ref=e180]: "Financial Domain Scale: A track record of managing Financial/ERP data at internet scale, ensuring transactional integrity and zero data loss."
              - listitem [ref=e181]:
                - paragraph [ref=e182]: "Modern Operations: An \"Infrastructure as Code\" mindset with specific experience building self-healing systems in distributed environments."
            - paragraph [ref=e183]
            - paragraph [ref=e184]: With competitive salaries and a generous benefits package, NVIDIA is widely considered to be one of the technology world’s most desirable employers. We have some of the most forward-thinking and hardworking people in the world working for us. Due to unprecedented growth, our exclusive engineering teams are rapidly growing. If you're a creative and autonomous engineer with a real passion for technology, we want to hear from you!
            - paragraph [ref=e185]
            - paragraph [ref=e186]
            - text: Your base salary will be determined based on your location, experience, and the pay of employees in similar positions. The base salary range is 184,000 USD - 287,500 USD.
